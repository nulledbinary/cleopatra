name: cleopatra

services:
  backend:
    build:
      context: ./backend
      dockerfile_inline: |
        FROM rust:1.77-slim AS builder
        WORKDIR /app
        COPY . .
        RUN cargo build --release

        FROM debian:bookworm-slim
        WORKDIR /app
        COPY --from=builder /app/target/release/cleopatra-backend .
        EXPOSE 8080
        CMD ["./cleopatra-backend"]
    ports:
      - "8080:8080"
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile_inline: |
        FROM node:22-alpine AS builder
        WORKDIR /app
        COPY package*.json ./
        RUN npm ci
        COPY . .
        RUN npm run build

        FROM node:22-alpine
        WORKDIR /app
        COPY --from=builder /app/public ./public
        COPY --from=builder /app/.next/standalone ./
        COPY --from=builder /app/.next/static ./.next/static
        EXPOSE 3000
        ENV PORT=3000
        ENV HOSTNAME="0.0.0.0"
        CMD ["node", "server.js"]
    ports:
      - "3000:3000"
    depends_on:
      - backend
    restart: unless-stopped
